<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>출퇴근 날씨</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B1E22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출퇴근 날씨">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F6F3;
    --surface:#FFFFFF;
    --text-primary:#1B1E22;
    --text-secondary:#767C87;
    --text-tertiary:#A6ABB3;
    --divider:#E9EAE6;
    --accent-warm:#E0654A;
    --accent-cool:#3E6FD9;
    --rain:#2F6FED;
    --rain-bg:rgba(47,111,237,0.09);
    --snow:#6B5CE0;
    --snow-bg:rgba(107,92,224,0.10);
    --idle:#D8DAD5;
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter', sans-serif;
    background:var(--bg);
    color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:420px;
    margin:0 auto;
    padding:16px 16px 32px;
  }
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:14px;
  }
  header h1{
    font-family:'DM Sans', sans-serif;
    font-size:20px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  header .date{
    font-size:12.5px;
    color:var(--text-secondary);
    margin-top:2px;
  }
  #refreshBtn{
    background:var(--surface);
    border:1px solid var(--divider);
    border-radius:10px;
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:var(--text-secondary);
    transition:transform .3s ease;
  }
  #refreshBtn:active{ transform:rotate(180deg); }
  #refreshBtn svg{ width:18px; height:18px; }

  .header-right{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .kma-badge{
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(11,94,215,0.08);
    border:1px solid rgba(11,94,215,0.18);
    color:#0B5ED7;
    font-size:11px;
    font-weight:700;
    letter-spacing:-0.01em;
    white-space:nowrap;
  }
  .kma-badge svg{ width:13px; height:13px; flex-shrink:0; }

  /* tabs */
  .tabbar{
    display:flex;
    gap:4px;
    background:var(--surface);
    border:1px solid var(--divider);
    border-radius:12px;
    padding:4px;
    margin-bottom:16px;
  }
  .tab-btn{
    flex:1;
    border:none;
    background:transparent;
    padding:9px 0;
    font-family:'Inter', sans-serif;
    font-size:13.5px;
    font-weight:600;
    color:var(--text-tertiary);
    border-radius:9px;
    cursor:pointer;
    transition:background .2s ease, color .2s ease;
  }
  .tab-btn.active{
    background:var(--bg);
    color:var(--text-primary);
  }
  .view{ display:none; }
  .view.active{ display:block; }

  .location-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:14px 16px 16px;
    margin-bottom:12px;
    border:1px solid var(--divider);
  }
  .loc-title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .loc-name{
    font-family:'DM Sans', sans-serif;
    font-size:15.5px;
    font-weight:600;
  }
  .loc-now{
    font-size:11.5px;
    color:var(--text-tertiary);
  }

  /* signature: 24h commute strip */
  .strip-wrap{
    position:relative;
    height:22px;
    margin-bottom:12px;
  }
  .strip-track{
    position:absolute;
    top:9px;
    left:0; right:0;
    height:4px;
    background:var(--idle);
    border-radius:2px;
  }
  .strip-zone{
    position:absolute;
    top:9px;
    height:4px;
    border-radius:2px;
  }
  .strip-zone.am, .strip-zone.pm{ background:var(--accent-cool); }
  .strip-zone.lunch{ background:var(--accent-warm); }
  .strip-now{
    position:absolute;
    top:5px;
    width:2px;
    height:12px;
    background:var(--text-primary);
    border-radius:1px;
  }
  .strip-labels{
    position:absolute;
    top:16px;
    left:0; right:0;
    display:flex;
    justify-content:space-between;
    font-size:9.5px;
    color:var(--text-tertiary);
  }

  .blocks-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
  }
  .col-header-row{
    margin-bottom:8px;
    padding-bottom:8px;
    border-bottom:1px solid var(--divider);
  }
  .col-header-row .colname{
    text-align:center;
    font-size:11px;
    font-weight:700;
    color:var(--text-primary);
    letter-spacing:-0.01em;
  }
  .block{
    background:var(--bg);
    border-radius:12px;
    padding:10px 6px 9px;
    text-align:center;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .block:active{ transform:scale(0.96); }
  .block.precip-rain{ background:var(--rain-bg); }
  .block.precip-snow{ background:var(--snow-bg); }
  .block .label{
    font-size:10.5px;
    color:var(--text-secondary);
    font-weight:600;
    margin-bottom:4px;
  }
  .block .icon{ font-size:19px; line-height:1; margin-bottom:3px; }
  .block .temp{
    font-family:'DM Sans', sans-serif;
    font-size:17px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .block .delta{
    font-size:10.5px;
    margin-top:2px;
    font-weight:600;
  }
  .delta.up{ color:var(--accent-warm); }
  .delta.down{ color:var(--accent-cool); }
  .delta.flat{ color:var(--text-tertiary); }
  .block .precip-tag{
    font-size:9px;
    font-weight:700;
    margin-top:3px;
    color:var(--rain);
  }
  .block.precip-snow .precip-tag{ color:var(--snow); }

  .section-label{
    font-size:12px;
    font-weight:600;
    color:var(--text-secondary);
    margin:18px 2px 8px;
  }

  .days-scroll{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:4px;
    -webkit-overflow-scrolling:touch;
  }
  .days-scroll::-webkit-scrollbar{ height:0; }
  .day-card{
    flex:0 0 auto;
    width:72px;
    background:var(--surface);
    border:1px solid var(--divider);
    border-radius:12px;
    padding:9px 6px;
    text-align:center;
  }
  .day-card.precip-rain{ background:var(--rain-bg); border-color:transparent; }
  .day-card.precip-snow{ background:var(--snow-bg); border-color:transparent; }
  .day-card .dname{
    font-size:10.5px;
    font-weight:600;
    color:var(--text-secondary);
    margin-bottom:5px;
  }
  .day-card .dicon{ font-size:18px; margin-bottom:4px; }
  .day-card .drange{
    font-family:'DM Sans', sans-serif;
    font-size:12.5px;
    font-weight:600;
  }
  .day-card .drange .lo{ color:var(--text-tertiary); font-weight:500; }
  .day-card .dtag{
    font-size:8.5px;
    font-weight:700;
    color:var(--rain);
    margin-top:3px;
  }
  .day-card.precip-snow .dtag{ color:var(--snow); }

  .loc-block-group{ margin-bottom:14px; }
  .loc-block-group:last-child{ margin-bottom:0; }
  .mini-loc-label{
    font-size:11px;
    font-weight:600;
    color:var(--text-tertiary);
    margin-bottom:6px;
  }

  #status{
    text-align:center;
    color:var(--text-tertiary);
    font-size:12.5px;
    padding:40px 0;
  }
  .hidden{ display:none; }

  /* settings view */
  /* detail view */
  .detail-loc-pills{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .detail-pill{
    flex:1;
    border:1px solid var(--divider);
    background:var(--surface);
    border-radius:10px;
    padding:9px 0;
    font-size:13px;
    font-weight:600;
    color:var(--text-tertiary);
    cursor:pointer;
  }
  .detail-pill.active{
    background:var(--text-primary);
    border-color:var(--text-primary);
    color:#fff;
  }
  .detail-header{
    margin-bottom:14px;
  }
  .detail-header .range-label{
    font-family:'DM Sans', sans-serif;
    font-size:16px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .detail-header .sub-label{
    font-size:12px;
    color:var(--text-tertiary);
    margin-top:2px;
  }
  .sparkline-card{
    background:var(--surface);
    border:1px solid var(--divider);
    border-radius:var(--radius);
    padding:14px 14px 10px;
    margin-bottom:14px;
  }
  .sparkline-card svg{ display:block; width:100%; height:auto; }
  .hour-list{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .hour-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--divider);
    border-radius:12px;
    padding:9px 12px;
  }
  .hour-row.precip-rain{ background:var(--rain-bg); border-color:transparent; }
  .hour-row.precip-snow{ background:var(--snow-bg); border-color:transparent; }
  .hour-row.now-row{ border-color:var(--text-primary); border-width:1.5px; }
  .hour-row .h-time{
    font-family:'DM Sans', sans-serif;
    font-size:13px;
    font-weight:700;
    width:44px;
    flex-shrink:0;
  }
  .hour-row .h-icon{ font-size:18px; width:26px; flex-shrink:0; text-align:center; }
  .hour-row .h-status{
    flex:1;
    font-size:12.5px;
    color:var(--text-secondary);
  }
  .hour-row .h-temp{
    font-family:'DM Sans', sans-serif;
    font-size:15px;
    font-weight:700;
    width:38px;
    text-align:right;
    flex-shrink:0;
  }
  .hour-row .h-prob{
    font-size:10.5px;
    font-weight:700;
    color:var(--rain);
    width:34px;
    text-align:right;
    flex-shrink:0;
  }
  .hour-row.precip-snow .h-prob{ color:var(--snow); }
  .detail-empty{
    text-align:center;
    color:var(--text-tertiary);
    font-size:13px;
    padding:40px 0;
  }

  .settings-card{
    background:var(--surface);
    border:1px solid var(--divider);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
  }
  .settings-card .slot-label{
    font-size:11px;
    font-weight:700;
    color:var(--text-tertiary);
    letter-spacing:.02em;
    margin-bottom:6px;
    text-transform:uppercase;
  }
  .current-loc-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .current-loc-row .name{
    font-family:'DM Sans', sans-serif;
    font-size:16px;
    font-weight:600;
  }
  .edit-btn{
    background:var(--bg);
    border:1px solid var(--divider);
    border-radius:8px;
    padding:6px 12px;
    font-size:12px;
    font-weight:600;
    color:var(--text-secondary);
    cursor:pointer;
  }
  .loc-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }
  .delete-btn{
    background:var(--bg);
    border:1px solid var(--divider);
    border-radius:8px;
    padding:6px 12px;
    font-size:12px;
    font-weight:600;
    color:var(--accent-warm);
    cursor:pointer;
  }
  .add-loc-btn{
    width:100%;
    background:var(--bg);
    border:1px dashed var(--divider);
    border-radius:10px;
    padding:11px 0;
    font-size:13px;
    font-weight:700;
    color:var(--text-secondary);
    cursor:pointer;
  }
  .search-row{
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .search-row input{
    flex:1;
    border:1px solid var(--divider);
    border-radius:10px;
    padding:10px 12px;
    font-size:13.5px;
    font-family:'Inter', sans-serif;
    background:var(--bg);
    color:var(--text-primary);
  }
  .search-row input:focus{ outline:2px solid var(--accent-cool); outline-offset:1px; }
  .search-row button{
    border:none;
    background:var(--text-primary);
    color:#fff;
    border-radius:10px;
    padding:0 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .search-results{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .result-item{
    display:flex;
    flex-direction:column;
    text-align:left;
    border:1px solid var(--divider);
    background:var(--bg);
    border-radius:10px;
    padding:9px 12px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .result-item:hover{ border-color:var(--accent-cool); }
  .result-item .rname{ font-size:13.5px; font-weight:600; color:var(--text-primary); }
  .result-item .rmeta{ font-size:11px; color:var(--text-tertiary); margin-top:1px; }
  .search-status{
    font-size:12px;
    color:var(--text-tertiary);
    margin-top:8px;
  }
  .time-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 0;
    border-bottom:1px solid var(--divider);
  }
  .time-row:last-of-type{ border-bottom:none; }
  .time-row-label{
    font-size:13px;
    font-weight:600;
    color:var(--text-primary);
    width:38px;
    flex-shrink:0;
  }
  .time-input{
    flex:1;
    min-width:0;
    border:1px solid var(--divider);
    border-radius:8px;
    padding:7px 6px;
    font-size:12.5px;
    font-family:'Inter', sans-serif;
    background:var(--bg);
    color:var(--text-primary);
  }
  .time-sep{
    font-size:12px;
    color:var(--text-tertiary);
    flex-shrink:0;
  }
  .settings-hint{
    font-size:12px;
    color:var(--text-tertiary);
    line-height:1.5;
    margin-top:4px;
    padding:0 2px;
  }
  .saved-toast{
    font-size:11.5px;
    color:var(--accent-cool);
    font-weight:600;
    margin-top:6px;
  }

  @media (max-width:360px){
    .block .icon{ font-size:17px; }
    .block .temp{ font-size:15.5px; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>출퇴근 날씨</h1>
        <div class="date" id="todayLabel">-</div>
      </div>
      <div class="header-right">
        <div class="kma-badge" title="기상청 단기예보 데이터를 함께 사용합니다">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
            <path d="M6.5 10.5c2-2.4 4-3.6 5.5-3.6s3.5 1.2 5.5 3.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M5 14c2.4 2 4.6 3 7 3s4.6-1 7-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>기상청</span>
        </div>
        <button id="refreshBtn" aria-label="새로고침">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="tabbar">
      <button class="tab-btn active" data-tab="weather">날씨</button>
      <button class="tab-btn" data-tab="detail">상세</button>
      <button class="tab-btn" data-tab="settings">설정</button>
    </div>

    <div class="view active" id="view-weather">
      <div id="status">불러오는 중...</div>
      <div id="content" class="hidden"></div>
    </div>

    <div class="view" id="view-detail">
      <div id="detailContent"></div>
    </div>

    <div class="view" id="view-settings">
      <div id="settingsContent"></div>
    </div>
  </div>

<script>
// index.html이 주소에 남아있으면 홈 화면 추가 시 그대로 저장되는 문제를 막기 위해
// 페이지 로드 시점에 주소창을 깨끗한 루트 경로로 정리한다.
(function cleanUrl(){
  try{
    if(/\/index\.html$/i.test(location.pathname)){
      const cleanPath = location.pathname.replace(/index\.html$/i, '');
      history.replaceState(null, '', cleanPath + location.search + location.hash);
    }
  }catch(e){ /* ignore */ }
})();

const DEFAULT_LOCATIONS = [
  { name:'용인 죽전동', lat:37.3253, lon:127.1082 },
  { name:'성남 분당구', lat:37.3826, lon:127.1189 }
];

const DEFAULT_TIMES = {
  am:    { start:8,  end:9,    label:'출근' },
  lunch: { start:12, end:13.5, label:'점심' },
  pm:    { start:17, end:19,   label:'퇴근' }
};

const LS_LOCATIONS_KEY = 'cw_locations';
const LS_TIMES_KEY = 'cw_times';

function loadLocationsFromStorage(){
  try{
    const raw = localStorage.getItem(LS_LOCATIONS_KEY);
    if(!raw) return null;
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length > 0 &&
       arr.every(l => typeof l.lat === 'number' && typeof l.lon === 'number' && typeof l.name === 'string')){
      return arr;
    }
    return null;
  }catch(e){ return null; }
}

function loadTimesFromStorage(){
  try{
    const raw = localStorage.getItem(LS_TIMES_KEY);
    if(!raw) return null;
    const decoded = JSON.parse(raw);
    const keys = ['am','lunch','pm'];
    if(keys.every(k => decoded[k] && typeof decoded[k].start === 'number' && typeof decoded[k].end === 'number')){
      keys.forEach(k => decoded[k].label = DEFAULT_TIMES[k].label);
      return decoded;
    }
    return null;
  }catch(e){ return null; }
}

function saveLocationsToStorage(locs){
  try{ localStorage.setItem(LS_LOCATIONS_KEY, JSON.stringify(locs)); }catch(e){ /* ignore */ }
}

function saveTimesToStorage(times){
  try{ localStorage.setItem(LS_TIMES_KEY, JSON.stringify(times)); }catch(e){ /* ignore */ }
}

// 예전 버전은 설정을 URL 쿼리(?locs=&times=)에 저장했었다.
// localStorage에 아직 저장된 값이 없고, 옛 URL에 값이 남아있다면 한 번만 옮겨온다.
function migrateLegacyUrlSettings(){
  try{
    const params = new URLSearchParams(window.location.search);
    const locsParam = params.get('locs');
    const timesParam = params.get('times');
    if(!locsParam && !timesParam) return;

    if(locsParam && !localStorage.getItem(LS_LOCATIONS_KEY)){
      const decoded = JSON.parse(decodeURIComponent(atob(locsParam)));
      if(Array.isArray(decoded) && decoded.length > 0){
        saveLocationsToStorage(decoded);
      }
    }
    if(timesParam && !localStorage.getItem(LS_TIMES_KEY)){
      const decoded = JSON.parse(decodeURIComponent(atob(timesParam)));
      saveTimesToStorage(decoded);
    }
    const url = new URL(window.location.href);
    url.searchParams.delete('locs');
    url.searchParams.delete('times');
    history.replaceState(null, '', url.pathname + url.search + url.hash);
  }catch(e){ /* ignore */ }
}
migrateLegacyUrlSettings();

const state = {
  locations: loadLocationsFromStorage() || DEFAULT_LOCATIONS.slice(),
  times: loadTimesFromStorage() || JSON.parse(JSON.stringify(DEFAULT_TIMES)),
  detail: { locIdx: 0, date: null, hour: null }, // date/hour null -> start from "now"
  hourlyFlat: []
};

function getBlockHours(startDec, endDec){
  const hours = [];
  const from = Math.floor(startDec);
  const to = Math.ceil(endDec);
  for(let h = from; h < to; h++){
    if(h < endDec) hours.push(h);
  }
  return hours;
}

function getBlocks(){
  const t = state.times;
  return ['am','lunch','pm'].map(key=>{
    const cfg = t[key];
    return {
      key,
      label: DEFAULT_TIMES[key].label,
      hours: getBlockHours(cfg.start, cfg.end),
      startPct: cfg.start/24*100,
      widthPct: Math.max(cfg.end - cfg.start, 0)/24*100
    };
  });
}

function decToTimeStr(dec){
  const h = Math.floor(dec);
  const m = Math.round((dec - h) * 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function timeStrToDec(str){
  const [h,m] = str.split(':').map(Number);
  return h + (m||0)/60;
}

const PRECIP_CODES = new Set([51,53,55,56,57,61,63,65,66,67,68,69,71,73,75,77,80,81,82,85,86,95,96,99]);
const SNOW_CODES = new Set([56,57,68,69,71,73,75,77,85,86]);

function weatherIcon(code, isDay=true){
  if(code===0) return isDay? '☀️':'🌙';
  if(code===1) return isDay? '🌤️':'🌙';
  if(code===2) return '⛅';
  if(code===3) return '☁️';
  if(code===45||code===48) return '🌫️';
  if([51,53,55].includes(code)) return '🌦️';
  if([56,57].includes(code)) return '🌨️';
  if([61,63,65,66,67].includes(code)) return '🌧️';
  if([68,69].includes(code)) return '🌨️';
  if([71,73,75,77].includes(code)) return '❄️';
  if([80,81,82].includes(code)) return '🌧️';
  if([85,86].includes(code)) return '🌨️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
}

function isPrecip(code){ return PRECIP_CODES.has(code); }
function isSnow(code){ return SNOW_CODES.has(code); }

function weatherStatusText(code){
  if(code===0) return '맑음';
  if(code===1) return '대체로 맑음';
  if(code===2) return '구름조금';
  if(code===3) return '흐림';
  if(code===45||code===48) return '안개';
  if([51,53,55].includes(code)) return '이슬비';
  if([56,57].includes(code)) return '어는이슬비';
  if([61,63,65].includes(code)) return '비';
  if([66,67].includes(code)) return '어는비';
  if(code===68) return '비/눈';
  if(code===69) return '빗방울눈날림';
  if([71,73,75].includes(code)) return '눈';
  if(code===77) return '눈날림';
  if([80,81,82].includes(code)) return '소나기';
  if([85,86].includes(code)) return '눈소나기';
  if([95,96,99].includes(code)) return '뇌우';
  return '-';
}

function fmtDate(d){
  const days=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function fmtDayShort(d){
  const days=['일','월','화','수','목','금','토'];
  return `${d.getDate()}일(${days[d.getDay()]})`;
}

async function fetchLocation(loc){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
    `&hourly=temperature_2m,precipitation,precipitation_probability,weather_code,is_day` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max` +
    `&timezone=Asia%2FSeoul&past_days=1&forecast_days=7`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('weather fetch failed');
  return res.json();
}

// 기상청(KMA) 단기예보 - 서버리스 함수(/api/kma)를 통해 조회한다.
// 아직 배포/환경변수 설정 전이거나 실패하면 조용히 null을 반환해서
// Open-Meteo 데이터만으로도 앱이 정상 동작하도록 한다.
async function fetchKma(loc){
  try{
    const res = await fetch(`/api/kma?lat=${loc.lat}&lon=${loc.lon}`);
    if(!res.ok) return null;
    const data = await res.json();
    if(!data || data.error || !Array.isArray(data.hourly)) return null;
    return data;
  }catch(e){ return null; }
}

// Open-Meteo 기반 dateMap에 기상청 단기예보 값을 덮어씌운다 (있는 시간대만).
// 기상청 단기예보는 최대 약 3일치이므로, 그 이후 날짜/이미 지난 어제 데이터는
// 그대로 Open-Meteo 값이 유지된다.
function mergeKmaIntoDateMap(dateMap, kmaHourly){
  if(!kmaHourly || kmaHourly.length === 0) return;
  kmaHourly.forEach(kh=>{
    if(!dateMap[kh.date]) dateMap[kh.date] = [];
    const arr = dateMap[kh.date];
    const idx = arr.findIndex(h => h.hour === kh.hour);
    const merged = { hour: kh.hour, temp: kh.temp, precip: kh.precip, code: kh.code, isDay: kh.isDay, prob: kh.prob, source: 'kma' };
    if(idx >= 0) arr[idx] = merged; else arr.push(merged);
  });
  Object.keys(dateMap).forEach(d => dateMap[d].sort((a,b) => a.hour - b.hour));
}

function groupHourlyByDate(hourly){
  const map = {};
  hourly.time.forEach((t, i)=>{
    const date = t.slice(0,10);
    const hour = parseInt(t.slice(11,13),10);
    if(!map[date]) map[date] = [];
    map[date].push({
      hour,
      temp: hourly.temperature_2m[i],
      precip: hourly.precipitation[i],
      prob: hourly.precipitation_probability ? hourly.precipitation_probability[i] : null,
      code: hourly.weather_code[i],
      isDay: hourly.is_day[i]
    });
  });
  return map;
}

function blockStats(hoursArr, blockHours){
  const hits = hoursArr.filter(h => blockHours.includes(h.hour));
  if(hits.length===0) return null;
  const avgTemp = hits.reduce((s,h)=>s+h.temp,0)/hits.length;
  let rep = hits[0];
  let maxPrecip = -1;
  hits.forEach(h=>{ if(h.precip > maxPrecip){ maxPrecip = h.precip; rep = h; } });
  const precipFlag = hits.some(h => h.precip > 0.1 || isPrecip(h.code));
  const snowFlag = hits.some(h => isSnow(h.code));
  const probs = hits.map(h => h.prob).filter(p => p !== null && p !== undefined);
  const maxProb = probs.length ? Math.max(...probs) : null;
  return { avgTemp, code: rep.code, isDay: rep.isDay, precipFlag, snowFlag, maxProb };
}

function deltaSpan(delta){
  if(delta === null) return '';
  const rounded = Math.round(delta*10)/10;
  if(Math.abs(rounded) < 0.3) return `<span class="delta flat">– 어제와 비슷</span>`;
  const cls = rounded > 0 ? 'up' : 'down';
  const arrow = rounded > 0 ? '▲' : '▼';
  return `<span class="delta ${cls}">${arrow}${Math.abs(rounded).toFixed(1)}°</span>`;
}

function renderLocation(loc, dateMap, sortedDates, locIdx){
  const todayIdx = 1; // past_days=1 -> index0=yesterday, index1=today
  const todayDate = sortedDates[todayIdx];
  const yestDate = sortedDates[todayIdx-1];
  const nowKST = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Seoul' }));
  const nowHour = nowKST.getHours() + nowKST.getMinutes()/60;
  const nowPct = nowHour/24*100;

  const strip = `
    <div class="strip-wrap">
      <div class="strip-track"></div>
      ${getBlocks().map(b=>`<div class="strip-zone ${b.key}" style="left:${b.startPct}%; width:${b.widthPct}%;"></div>`).join('')}
      <div class="strip-now" style="left:${nowPct}%;"></div>
      <div class="strip-labels"><span>0시</span><span>12시</span><span>24시</span></div>
    </div>`;

  const colHeader = `
    <div class="blocks-row col-header-row">
      ${getBlocks().map(b=>`<div class="colname">${b.label}</div>`).join('')}
    </div>`;

  const todayHours = dateMap[todayDate] || [];
  const yestHours = dateMap[yestDate] || [];

  const blocksHtml = getBlocks().map(b=>{
    const todayStat = blockStats(todayHours, b.hours);
    const yestStat = blockStats(yestHours, b.hours);
    if(!todayStat){
      return `<div class="block"><div class="label">-</div><div class="icon">–</div><div class="temp">-</div></div>`;
    }
    const delta = yestStat ? todayStat.avgTemp - yestStat.avgTemp : null;
    const precipClass = todayStat.precipFlag ? (todayStat.snowFlag ? 'precip-snow' : 'precip-rain') : '';
    const probTxt = todayStat.maxProb !== null ? ` ${todayStat.maxProb}%` : '';
    const tag = todayStat.precipFlag ? `<div class="precip-tag">${todayStat.snowFlag?'눈 예보':'비 예보'}${probTxt}</div>` : '';
    return `
      <div class="block ${precipClass}" data-detail="1" data-loc="${locIdx}" data-date="${todayDate}" data-hour="${b.hours[0]}">
        <div class="label">${weatherStatusText(todayStat.code)}</div>
        <div class="icon">${weatherIcon(todayStat.code, todayStat.isDay)}</div>
        <div class="temp">${Math.round(todayStat.avgTemp)}°</div>
        ${deltaSpan(delta)}
        ${tag}
      </div>`;
  }).join('');

  const detailDays = [todayIdx+1, todayIdx+2];
  const detailHtml = detailDays.map((idx, i)=>{
    const date = sortedDates[idx];
    if(!date) return '';
    const prevDate = sortedDates[idx-1];
    const hours = dateMap[date] || [];
    const prevHours = dateMap[prevDate] || [];
    const d = new Date(date + 'T00:00:00');
    const label = i===0 ? '내일' : fmtDayShort(d);
    const blocks = getBlocks().map(b=>{
      const stat = blockStats(hours, b.hours);
      const prevStat = blockStats(prevHours, b.hours);
      if(!stat) return `<div class="block"><div class="label">-</div><div class="icon">–</div><div class="temp">-</div></div>`;
      const delta = prevStat ? stat.avgTemp - prevStat.avgTemp : null;
      const precipClass = stat.precipFlag ? (stat.snowFlag ? 'precip-snow' : 'precip-rain') : '';
      const probTxt = stat.maxProb !== null ? ` ${stat.maxProb}%` : '';
      const tag = stat.precipFlag ? `<div class="precip-tag">${stat.snowFlag?'눈':'비'}${probTxt}</div>` : '';
      return `
        <div class="block ${precipClass}" data-detail="1" data-loc="${locIdx}" data-date="${date}" data-hour="${b.hours[0]}">
          <div class="label">${weatherStatusText(stat.code)}</div>
          <div class="icon">${weatherIcon(stat.code, stat.isDay)}</div>
          <div class="temp">${Math.round(stat.avgTemp)}°</div>
          ${deltaSpan(delta)}
          ${tag}
        </div>`;
    }).join('');
    return `
      <div class="loc-block-group">
        <div class="mini-loc-label">${label}</div>
        <div class="blocks-row">${blocks}</div>
      </div>`;
  }).join('');

  return `
    <div class="location-card">
      <div class="loc-title-row">
        <div class="loc-name">${loc.name}</div>
        <div class="loc-now">지금 ${nowKST.getHours()}:${String(nowKST.getMinutes()).padStart(2,'0')}</div>
      </div>
      ${strip}
      ${colHeader}
      <div class="loc-block-group">
        <div class="mini-loc-label">오늘</div>
        <div class="blocks-row">${blocksHtml}</div>
      </div>
      ${detailHtml}
    </div>`;
}

function renderExtended(loc, daily, sortedDates){
  const todayIdx = 1;
  const startIdx = todayIdx + 3;
  const cards = [];
  for(let i=startIdx; i<daily.time.length; i++){
    const date = daily.time[i];
    const d = new Date(date+'T00:00:00');
    const code = daily.weather_code[i];
    const hi = Math.round(daily.temperature_2m_max[i]);
    const lo = Math.round(daily.temperature_2m_min[i]);
    const precip = daily.precipitation_sum[i];
    const prob = daily.precipitation_probability_max ? daily.precipitation_probability_max[i] : null;
    const flag = isPrecip(code) || precip > 0.2;
    const snow = isSnow(code);
    const cls = flag ? (snow ? 'precip-snow' : 'precip-rain') : '';
    const probTxt = (flag && prob !== null && prob !== undefined) ? ` ${prob}%` : '';
    const tag = flag ? `<div class="dtag">${snow?'눈':'비'}${probTxt}</div>` : '';
    cards.push(`
      <div class="day-card ${cls}">
        <div class="dname">${fmtDayShort(d)}</div>
        <div class="dicon">${weatherIcon(code, true)}</div>
        <div class="drange">${hi}° <span class="lo">${lo}°</span></div>
        ${tag}
      </div>`);
  }
  return `
    <div class="loc-block-group">
      <div class="mini-loc-label">${loc.name}</div>
      <div class="days-scroll">${cards.join('')}</div>
    </div>`;
}

async function loadWeather(){
  const statusEl = document.getElementById('status');
  const contentEl = document.getElementById('content');
  try{
    statusEl.textContent = '불러오는 중...';
    statusEl.classList.remove('hidden');
    contentEl.classList.add('hidden');

    const [results, kmaResults] = await Promise.all([
      Promise.all(state.locations.map(fetchLocation)),
      Promise.all(state.locations.map(fetchKma))
    ]);

    const now = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Seoul' }));
    document.getElementById('todayLabel').textContent = fmtDate(now);

    let html = '';
    const perLocData = [];
    state.hourlyFlat = state.locations.map(()=>[]);

    results.forEach((data, i)=>{
      const loc = state.locations[i];
      const dateMap = groupHourlyByDate(data.hourly);
      mergeKmaIntoDateMap(dateMap, kmaResults[i] && kmaResults[i].hourly);
      const sortedDates = Object.keys(dateMap).sort();
      perLocData.push({ loc, dateMap, sortedDates, daily: data.daily });
      state.hourlyFlat[i] = sortedDates.flatMap(d => (dateMap[d]||[]).map(h => ({ date: d, ...h })));
      html += renderLocation(loc, dateMap, sortedDates, i);
    });

    html += `<div class="section-label">이후 예보 (일 단위)</div>`;
    perLocData.forEach(({loc, daily, sortedDates})=>{
      html += renderExtended(loc, daily, sortedDates);
    });

    contentEl.innerHTML = html;
    statusEl.classList.add('hidden');
    contentEl.classList.remove('hidden');

    contentEl.querySelectorAll('.block[data-detail]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const locIdx = parseInt(el.getAttribute('data-loc'),10);
        const date = el.getAttribute('data-date');
        const hour = parseInt(el.getAttribute('data-hour'),10);
        openDetail(locIdx, date, hour);
      });
    });

    if(document.getElementById('view-detail').classList.contains('active')){
      renderDetail();
    }
  }catch(err){
    console.error(err);
    statusEl.textContent = '날씨 정보를 불러오지 못했어요 (' + (err.message || err) + '). 새로고침 버튼을 눌러 다시 시도해주세요.';
    statusEl.classList.remove('hidden');
    contentEl.classList.add('hidden');
  }
}

/* ---------- detail view (12-hour outlook) ---------- */
function findStartIndex(flat, date, hour){
  if(!flat || flat.length === 0) return -1;
  if(date === null || hour === null){
    const nowKST = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Seoul' }));
    const y = nowKST.getFullYear();
    const m = String(nowKST.getMonth()+1).padStart(2,'0');
    const d = String(nowKST.getDate()).padStart(2,'0');
    const todayStr = `${y}-${m}-${d}`;
    const curHour = nowKST.getHours();
    let idx = flat.findIndex(h => h.date > todayStr || (h.date === todayStr && h.hour >= curHour));
    if(idx === -1) idx = 0;
    return idx;
  }
  let idx = flat.findIndex(h => h.date === date && h.hour === hour);
  if(idx === -1){
    idx = flat.findIndex(h => h.date > date || (h.date === date && h.hour >= hour));
  }
  return idx === -1 ? 0 : idx;
}

function buildDetailChart(slice){
  const W = 340;
  const marginLeft = 28, marginRight = 32;
  const plotW = W - marginLeft - marginRight;
  const n = slice.length;
  const stepX = plotW / ((n - 1) || 1);
  const xOf = i => marginLeft + i*stepX;

  const legendY = 10;
  const plotTop = 24, plotH = 96;

  /* --- precipitation probability bars (drawn behind the temp line) --- */
  const probs = slice.map(s => (s.prob!==null && s.prob!==undefined) ? s.prob : 0);
  const barW = Math.max((plotW/n)*0.5, 4);
  const precipBars = probs.map((p,i)=>{
    const barH = Math.max((p/100)*plotH, p>0?2:0);
    const x = xOf(i) - barW/2;
    const y = plotTop + (plotH - barH);
    const snow = isSnow(slice[i].code);
    const color = snow ? 'var(--snow)' : 'var(--rain)';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="2" fill="${color}" opacity="0.32"/>`;
  }).join('');

  /* --- temperature line (drawn on top of the bars) --- */
  const temps = slice.map(s => s.temp);
  const tMin = Math.min(...temps), tMax = Math.max(...temps);
  const tRange = (tMax - tMin) || 1;
  const yOfTemp = t => plotTop + (1 - (t - tMin)/tRange) * plotH;

  const tempPointsArr = temps.map((t,i) => `${xOf(i).toFixed(1)},${yOfTemp(t).toFixed(1)}`);
  const tempPath = tempPointsArr.join(' ');
  const tempDots = temps.map((t,i)=>
    `<circle cx="${xOf(i).toFixed(1)}" cy="${yOfTemp(t).toFixed(1)}" r="2.4" fill="var(--accent-cool)" stroke="var(--surface)" stroke-width="1.2"/>`
  ).join('');
  const tempValueLabels = temps.map((t,i)=>
    `<text x="${xOf(i).toFixed(1)}" y="${(yOfTemp(t)-6).toFixed(1)}" font-size="7.5" text-anchor="middle" fill="var(--text-secondary)">${Math.round(t)}°</text>`
  ).join('');

  /* --- left axis: temperature / right axis: precipitation probability --- */
  const leftAxis = `
    <text x="${marginLeft-4}" y="${plotTop+4}" font-size="7.5" text-anchor="end" fill="var(--accent-cool)">${Math.round(tMax)}°</text>
    <text x="${marginLeft-4}" y="${plotTop+plotH}" font-size="7.5" text-anchor="end" fill="var(--accent-cool)">${Math.round(tMin)}°</text>`;
  const rightAxis = `
    <text x="${W-marginRight+5}" y="${plotTop+4}" font-size="7.5" text-anchor="start" fill="var(--rain)">100%</text>
    <text x="${W-marginRight+5}" y="${plotTop+plotH/2+3}" font-size="7.5" text-anchor="start" fill="var(--rain)">50%</text>
    <text x="${W-marginRight+5}" y="${plotTop+plotH}" font-size="7.5" text-anchor="start" fill="var(--rain)">0%</text>`;

  const baseline = `<line x1="${marginLeft}" y1="${plotTop+plotH}" x2="${W-marginRight}" y2="${plotTop+plotH}" stroke="var(--divider)" stroke-width="1"/>`;

  /* --- legend --- */
  const legend = `
    <line x1="${marginLeft}" y1="${legendY-3}" x2="${marginLeft+12}" y2="${legendY-3}" stroke="var(--accent-cool)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="${marginLeft+16}" y="${legendY}" font-size="9" font-weight="700" fill="var(--text-secondary)">기온</text>
    <rect x="${marginLeft+50}" y="${legendY-8}" width="10" height="10" rx="2" fill="var(--rain)" opacity="0.55"/>
    <text x="${marginLeft+64}" y="${legendY}" font-size="9" font-weight="700" fill="var(--text-secondary)">강수확률</text>`;

  /* --- shared x-axis (hour) labels --- */
  const xAxisY = plotTop + plotH + 14;
  const skip = n > 8 ? 2 : 1;
  const xLabels = slice.map((s,i)=>{
    if(i % skip !== 0 && i !== n-1) return '';
    return `<text x="${xOf(i).toFixed(1)}" y="${xAxisY}" font-size="7.5" text-anchor="middle" fill="var(--text-tertiary)">${s.hour}시</text>`;
  }).join('');

  const totalH = xAxisY + 6;

  return `<svg viewBox="0 0 ${W} ${totalH}" width="100%" height="auto">
    ${legend}
    ${baseline}
    ${precipBars}
    <polyline points="${tempPath}" fill="none" stroke="var(--accent-cool)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${tempDots}
    ${tempValueLabels}
    ${leftAxis}
    ${rightAxis}
    ${xLabels}
  </svg>`;
}

function openDetail(locIdx, date, hour){
  state.detail = { locIdx, date, hour };
  switchTab('detail');
  renderDetail();
}

function renderDetail(){

    <div class="detail-loc-pills">

    </div>`;

    wrap.innerHTML = pills + `<div class="detail-empty">날씨 탭에서 먼저 데이터를 불러와주세요.</div>`;

  const firstD = new Date(first.date + 'T00:00:00');

  const subLabel = `${loc.name} · ${slice.length}시간 흐름`;

  const header = `
    <div class="detail-header">
      <div class="range-label">${rangeLabel}</div>
      <div class="sub-label">${subLabel}</div>
    </div>`;

  const spark = `<div class="sparkline-card">${buildDetailChart(slice)}</div>`;

  const nowKST = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Seoul' }));
  const nowDateStr = `${nowKST.getFullYear()}-${String(nowKST.getMonth()+1).padStart(2,'0')}-${String(nowKST.getDate()).padStart(2,'0')}`;
  const nowHour = nowKST.getHours();

  const rows = slice.map(s=>{
    const precipFlag = s.precip > 0.1 || isPrecip(s.code);
    const snowFlag = isSnow(s.code);
    const precipClass = precipFlag ? (snowFlag ? 'precip-snow' : 'precip-rain') : '';
    const nowClass = (s.date === nowDateStr && s.hour === nowHour) ? 'now-row' : '';
    const probTxt = (s.prob !== null && s.prob !== undefined) ? `${s.prob}%` : '';
    return `
      <div class="hour-row ${precipClass} ${nowClass}">
        <div class="h-time">${s.hour}시</div>
        <div class="h-icon">${weatherIcon(s.code, s.isDay)}</div>
        <div class="h-status">${weatherStatusText(s.code)}</div>
        <div class="h-temp">${Math.round(s.temp)}°</div>
        <div class="h-prob">${probTxt}</div>
      </div>`;
  }).join('');

  wrap.innerHTML = pills + header + spark + `<div class="hour-list">${rows}</div>`;
  bindDetailPills();
}

function bindDetailPills(){
  document.querySelectorAll('[data-pill]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.detail.locIdx = parseInt(btn.getAttribute('data-pill'),10);
      renderDetail();
    });
  });
}

let editingSlot = null; // number index = editing that slot, 'new' = adding a new location, null = none open

function searchBlockHtml(key){
  return `
    <div class="search-row">
      <input type="text" id="searchInput-${key}" placeholder="동네 이름 검색 (예: 판교동)" />
      <button data-search="${key}">검색</button>
    </div>
    <div class="search-results" id="searchResults-${key}"></div>
    <div class="search-status" id="searchStatus-${key}"></div>`;
}

function renderSettings(){
  const wrap = document.getElementById('settingsContent');

  const timesHtml = `
    <div class="settings-card">
      <div class="slot-label">시간대 설정</div>
      ${['am','lunch','pm'].map(key=>{
        const cfg = state.times[key];
        return `
        <div class="time-row">
          <div class="time-row-label">${DEFAULT_TIMES[key].label}</div>
          <input type="time" class="time-input" data-timekey="${key}" data-bound="start" value="${decToTimeStr(cfg.start)}">
          <span class="time-sep">~</span>
          <input type="time" class="time-input" data-timekey="${key}" data-bound="end" value="${decToTimeStr(cfg.end)}">
        </div>`;
      }).join('')}
      <div class="settings-hint">출근·점심·퇴근 시간을 실제 생활 패턴에 맞게 바꿀 수 있어요.</div>
    </div>`;

  const canDelete = state.locations.length > 1;
  const locsHtml = state.locations.map((loc, idx)=>{
    const isEditing = editingSlot === idx;
    return `
      <div class="settings-card">
        <div class="slot-label">지역 ${idx+1}</div>
        <div class="current-loc-row">
          <div class="name">${loc.name}</div>
          <div class="loc-actions">
            <button class="edit-btn" data-edit="${idx}">${isEditing ? '닫기' : '변경'}</button>
            ${canDelete ? `<button class="delete-btn" data-delete="${idx}">삭제</button>` : ''}
          </div>
        </div>
        ${isEditing ? searchBlockHtml(idx) : ''}
      </div>`;
  }).join('');

  const isAddingNew = editingSlot === 'new';
  const addCardHtml = `
    <div class="settings-card">
      <button class="add-loc-btn" data-add="1">${isAddingNew ? '닫기' : '+ 지역 추가'}</button>
      ${isAddingNew ? searchBlockHtml('new') : ''}
    </div>`;

  wrap.innerHTML = timesHtml + locsHtml + addCardHtml +
    `<div class="settings-hint">지역·시간 설정은 이 기기에 저장돼요. 앱을 껐다 켜도 그대로 유지됩니다.</div>`;

  document.querySelectorAll('.time-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const key = inp.getAttribute('data-timekey');
      const bound = inp.getAttribute('data-bound');
      if(!inp.value) return;
      const dec = timeStrToDec(inp.value);
      state.times[key][bound] = dec;
      saveTimesToStorage(state.times);
      loadWeather();
    });
  });

  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = parseInt(btn.getAttribute('data-edit'),10);
      editingSlot = (editingSlot === idx) ? null : idx;
      renderSettings();
      focusSearchInput(editingSlot);
    });
  });

  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = parseInt(btn.getAttribute('data-delete'),10);
      removeLocation(idx);
    });
  });

  document.querySelectorAll('[data-add]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      editingSlot = isAddingNew ? null : 'new';
      renderSettings();
      focusSearchInput(editingSlot);
    });
  });

  document.querySelectorAll('[data-search]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      doSearch(btn.getAttribute('data-search'));
    });
  });
}

function focusSearchInput(key){
  if(key === null) return;
  const input = document.getElementById(`searchInput-${key}`);
  if(input){
    input.focus();
    input.addEventListener('keydown', e=>{
      if(e.key === 'Enter') doSearch(String(key));
    });
  }
}

// 북한(조선민주주의인민공화국) 결과는 검색에서 제외한다.
// countrycodes=kr로 이미 걸러지지만, 혹시 모를 경계 사례를 대비해 한 번 더 확인한다.
function isExcludedResult(r){
  const cc = ((r.address && r.address.country_code) || '').toLowerCase();
  if(cc === 'kp') return true;
  const countryName = (r.address && r.address.country) || '';
  return /조선민주주의인민공화국|북한|North Korea|DPRK/i.test(countryName);
}

function resultMeta(r){
  const a = r.address || {};
  return [a.borough, a.city || a.county || a.district, a.province].filter(Boolean).join(' · ');
}

function resultPrimaryName(r){
  return r.name || (r.display_name || '').split(',')[0];
}

// Open-Meteo 지오코딩 DB는 "죽전동" 같은 한국 동/읍/면 단위 지명을 거의 갖고 있지 않아서
// (예: "용인시" 대표 좌표만 있고 세부 동은 없음) OpenStreetMap 기반 Nominatim으로 교체했다.
// 대한민국(countrycodes=kr)으로 검색을 제한해 관련 없는 해외 결과와 북한을 함께 걸러낸다.
async function geocodeSearch(query){
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}` +
    `&format=json&addressdetails=1&accept-language=ko&limit=8&countrycodes=kr`;
  const res = await fetch(url);
  if(!res.ok) return [];
  const data = await res.json();
  return (Array.isArray(data) ? data : []).filter(r => !isExcludedResult(r));
}

async function doSearch(key){
  const input = document.getElementById(`searchInput-${key}`);
  const resultsEl = document.getElementById(`searchResults-${key}`);
  const statusEl = document.getElementById(`searchStatus-${key}`);
  const query = input.value.trim();
  if(!query){ return; }
  statusEl.textContent = '검색 중...';
  resultsEl.innerHTML = '';
  try{
    const results = await geocodeSearch(query);
    if(results.length === 0){
      statusEl.textContent = '검색 결과가 없어요. 다른 이름으로 시도해보세요.';
      return;
    }
    statusEl.textContent = '';
    resultsEl.innerHTML = results.map((r, i)=>{
      return `<div class="result-item" data-ridx="${i}">
        <div class="rname">${resultPrimaryName(r)}</div>
        <div class="rmeta">${resultMeta(r)}</div>
      </div>`;
    }).join('');
    resultsEl.querySelectorAll('.result-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        const r = results[parseInt(el.getAttribute('data-ridx'),10)];
        selectLocation(null, { name:resultPrimaryName(r), lat:parseFloat(r.lat), lon:parseFloat(r.lon) });
      });
    });
  }catch(e){
    console.error(e);
    statusEl.textContent = '검색에 실패했어요. 다시 시도해주세요.';
  }
}

function selectLocation(_unused, newLoc){
  const key = editingSlot;
  if(key === 'new'){
    state.locations.push(newLoc);
  } else {
    state.locations[key] = newLoc;
  }
  saveLocationsToStorage(state.locations);
  editingSlot = null;
  renderSettings();
  const wrap = document.getElementById('settingsContent');
  const toast = document.createElement('div');
  toast.className = 'saved-toast';
  toast.textContent = `${newLoc.name}으로 저장했어요. 날씨 탭에서 확인해보세요.`;
  wrap.appendChild(toast);
  loadWeather();
}

function removeLocation(idx){
  if(state.locations.length <= 1) return;
  state.locations.splice(idx, 1);
  saveLocationsToStorage(state.locations);
  if(state.detail.locIdx >= state.locations.length) state.detail.locIdx = 0;
  editingSlot = null;
  renderSettings();
  loadWeather();
}

/* ---------- global error surfacing ---------- */
function showFatalError(msg){
  const statusEl = document.getElementById('status');
  const contentEl = document.getElementById('content');
  if(statusEl){
    statusEl.textContent = '오류: ' + msg;
    statusEl.classList.remove('hidden');
  }
  if(contentEl) contentEl.classList.add('hidden');
}
window.addEventListener('error', function(e){
  showFatalError(e.message || '알 수 없는 오류');
});
window.addEventListener('unhandledrejection', function(e){
  const reason = e.reason && e.reason.message ? e.reason.message : String(e.reason);
  showFatalError(reason);
});

/* ---------- tabs ---------- */
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`view-${name}`).classList.add('active');
  if(name === 'detail') renderDetail();
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    switchTab(btn.dataset.tab);
  });
});

document.getElementById('refreshBtn').addEventListener('click', loadWeather);

renderSettings();
loadWeather();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

</script>
